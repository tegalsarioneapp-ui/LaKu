kind = "web"
previewPath = "/"
title = "BOP RT 005 Offline Manager"
version = "1.0.0"
id = "artifacts/bop-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22524

[services.development]
run = "pnpm --filter @workspace/bop-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bop-app", "run", "build" ]
publicDir = "artifacts/bop-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22524"
BASE_PATH = "/"
